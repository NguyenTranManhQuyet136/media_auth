# Upstream definitions - sử dụng tên dịch vụ Docker
# Tên này phải trùng với tên service trong docker-compose.yml
upstream minio_backend {
    server minio:9000;
}

upstream minio_console {
    server minio:9001;
}

upstream auth_service {
    server auth-backend:8080;
}

server {
    listen 80;
    server_name minio.local www.minio.local;

    # Thêm resolver để Nginx có thể phân giải tên service trong Docker
    resolver 127.0.0.11 valid=30s;

    keepalive_timeout 240;
    client_max_body_size 50M;

    # Resolve token: ưu tiên Authorization header, fallback sang ?token=xxx query param
    set $effective_token $http_authorization;
    if ($effective_token = "") {
        set $effective_token "Bearer $arg_token";
    }

    location /minio/health/live {
        proxy_pass http://minio_backend;
        proxy_set_header Host $http_host;
    }

    # Tất cả các request yêu cầu xác thực qua auth_request
    location / {
        # Xử lý Preflight request (OPTIONS) cho CORS
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, HEAD' always;
            add_header 'Access-Control-Allow-Headers' 'Authorization, Origin, X-Requested-With, Content-Type, Accept' always;
            add_header 'Access-Control-Max-Age' 1728000;
            add_header 'Content-Type' 'text/plain; charset=utf-8';
            add_header 'Content-Length' 0;
            return 204;
        }

        # ---------------------------------------------------------
        # 🍪 CẤU HÌNH COOKIE PERSISTENCE CHO DOMAIN ĐỘC LẬP
        # ---------------------------------------------------------
        
        # 1. Chạy xác thực ngầm
        auth_request /auth;

        # Giữ lại các Header CORS cần thiết
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Headers' 'Authorization, Origin, X-Requested-With, Content-Type, Accept' always;

        auth_request_set $auth_status $upstream_status;

        # Chuyển tiếp tới MinIO sau khi xác thực thành công
        proxy_pass http://minio_backend;
        proxy_hide_header 'Access-Control-Allow-Origin';
        proxy_hide_header 'Access-Control-Allow-Methods';
        proxy_hide_header 'Access-Control-Allow-Headers';
        
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Nginx-Proxy true;
        proxy_redirect off;

        # Cài đặt timeout cho các upload lớn
        proxy_connect_timeout 300;
        proxy_send_timeout 300;
        proxy_read_timeout 300;
    }

    # Sub-request nội bộ tới backend xác thực
    location = /auth {
        internal;
        # Ép Nginx truyền tham số từ URL sang cho backend
        proxy_pass http://auth-backend:8080/verify-jwt?$query_string;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header X-Original-URI $request_uri;
        proxy_set_header X-Original-Method $request_method;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # Giữ lại Authorization header
        proxy_set_header Authorization $effective_token;
    }

    # Trang lỗi tùy chỉnh khi xác thực thất bại
    error_page 401 = @error401;
    location @error401 {
        default_type application/json;
        return 401 '{"error": "Unauthorized", "message": "Valid JWT token required từ máy bạn"}';
    }
}

# Cấu hình cho MinIO Console
server {
    listen 80;
    server_name console.minio.local;

    client_max_body_size 50M;

    location / {
        proxy_pass http://minio_console;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }
}
