# Upstream definitions - sử dụng tên dịch vụ Docker
# Tên này phải trùng với tên service trong docker-compose.yml
upstream minio_backend {
    server minio:9000;
}

upstream minio_console {
    server minio:9001;
}


server {
    listen 80;
    server_name minio.local www.minio.local;

    # Thêm resolver để Nginx có thể phân giải tên service trong Docker
    resolver 127.0.0.11 valid=30s;

    keepalive_timeout 240;
    client_max_body_size 50M;

    # Resolve token: ưu tiên Authorization header, fallback sang ?token=xxx query param
    set $effective_token $http_authorization;
    if ($effective_token = "") {
        set $effective_token "Bearer $arg_token";
    }

    location /minio/health/live {
        proxy_pass http://minio_backend;
        proxy_set_header Host $http_host;
    }

    # Tất cả các request yêu cầu xác thực qua auth_request
    location / {
        # 1. Xác định Origin thích hợp (Dùng song song, không lồng nhau)
        set $cors_origin "*";
        if ($http_origin ~* (https?://.*\.local(:[0-9]+)?)) {
            set $cors_origin $http_origin;
        }

        set $allow_credentials "false";
        if ($cors_origin != "*") {
            set $allow_credentials "true";
        }

        # 2. Xử lý Preflight request (OPTIONS) cho CORS
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' $cors_origin always;
            add_header 'Access-Control-Allow-Credentials' $allow_credentials always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, HEAD' always;
            add_header 'Access-Control-Allow-Headers' 'Authorization, Origin, X-Requested-With, Content-Type, Accept, Range' always;
            add_header 'Access-Control-Max-Age' 1728000;
            add_header 'Content-Type' 'text/plain; charset=utf-8';
            add_header 'Content-Length' 0;
            return 204;
        }

        # ---------------------------------------------------------
        # 🛡️ XÁC THỰC ĐỘC LẬP THEO TOKEN / COOKIE
        # ---------------------------------------------------------
        
        # 1. Chạy xác thực ngầm
        auth_request /auth;

        # 2. Gỡ bỏ Header CORS từ MinIO (nếu có) để tránh xung đột
        proxy_hide_header 'Access-Control-Allow-Origin';
        proxy_hide_header 'Access-Control-Allow-Methods';
        proxy_hide_header 'Access-Control-Allow-Headers';

        # 3. Phản hồi Header CORS chuẩn cho Trình duyệt
        add_header 'Access-Control-Allow-Origin' $cors_origin always;
        add_header 'Access-Control-Allow-Credentials' $allow_credentials always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, HEAD' always;
        add_header 'Access-Control-Allow-Headers' 'Authorization, Origin, X-Requested-With, Content-Type, Accept, Range' always;
        add_header 'Access-Control-Expose-Headers' 'Content-Range, Content-Length, Content-Type' always;

        auth_request_set $auth_status $upstream_status;

        # Chuyển tiếp tới MinIO sau khi xác thực thành công
        proxy_pass http://minio_backend;
        
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Nginx-Proxy true;
        proxy_redirect off;

        # Cài đặt timeout cho các upload lớn
        proxy_connect_timeout 300;
        proxy_send_timeout 300;
        proxy_read_timeout 300;
    }

    # Sub-request nội bộ tới backend xác thực
    location = /auth {
        internal;
        # Dùng biến để tránh lỗi 'host not found' khi Nginx khởi chạy trước Backend
        set $auth_backend "http://auth-backend:8080";
        proxy_pass $auth_backend/verify-jwt?$query_string;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header X-Original-URI $request_uri;
        proxy_set_header X-Original-Method $request_method;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        
        # 🕵️‍♂️ HỨNG TRỌN THÔNG TIN TỪ TRÌNH DUYỆT
        proxy_set_header Authorization $effective_token;
        proxy_set_header Cookie $http_cookie; # Chuyển tiếp toàn bộ Cookie
        proxy_set_header Referer $http_referer; # Biết được video đang chạy ở trang nào
        proxy_set_header User-Agent $http_user_agent; 
    }

    # Trang lỗi tùy chỉnh khi xác thực thất bại
    error_page 401 = @error401;
    location @error401 {
        default_type application/json;
        add_header 'Access-Control-Allow-Origin' $cors_origin always;
        add_header 'Access-Control-Allow-Credentials' $allow_credentials always;
        return 401 '{"error": "Unauthorized", "message": "Valid JWT token required từ máy bạn"}';
    }
}

# Cấu hình cho MinIO Console
server {
    listen 80;
    server_name console.minio.local;

    client_max_body_size 50M;

    location / {
        proxy_pass http://minio_console;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }
}
